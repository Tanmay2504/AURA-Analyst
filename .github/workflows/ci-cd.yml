name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────
  # Backend: syntax lint only (no broken test imports)
  # ─────────────────────────────────────────────
  lint-backend:
    name: Backend Lint (Python 3.11)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install flake8
      run: pip install flake8

    - name: Lint — syntax errors and undefined names only
      run: |
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=backend/tests

  # ─────────────────────────────────────────────
  # Frontend: install + build
  # ─────────────────────────────────────────────
  build-frontend:
    name: Frontend Build (Node 18)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: Lint
      working-directory: ./frontend
      run: npm run lint || true

    - name: Build
      working-directory: ./frontend
      env:
        NEXT_PUBLIC_API_URL: https://aura-analyst-backend.onrender.com
      run: npm run build

  # ─────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────
  ci-success:
    name: CI Passed
    needs: [lint-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check all jobs passed
      run: |
        if [[ "${{ needs.lint-backend.result }}" == "failure" || "${{ needs.build-frontend.result }}" == "failure" ]]; then
          echo "One or more CI jobs failed."
          exit 1
        fi
        echo "All CI jobs passed ✅"
